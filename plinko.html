<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>倒弹珠 · Plinko</title>
<style>
  /* ============================================================
   * 全局样式与设计变量
   * 想修改配色：直接改 --bg / --accent / --peg 等变量即可
   * ============================================================ */
  :root {
    --bg: #1a1a2e;            /* 主背景色 */
    --bg-2: #16213e;          /* 次级背景色 */
    --panel: rgba(255,255,255,0.06); /* 半透明面板 */
    --border: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #8a8aa0;
    --accent: #ff8c42;        /* 主强调色（橙）- 发射按钮 */
    --accent-2: #ffd166;      /* 次强调色（黄）- 弹珠 */
    --peg: #4cc9f0;           /* 钉子色（青蓝） */
    --danger: #6c757d;        /* 重置按钮（灰） */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: radial-gradient(circle at 50% 0%, var(--bg-2), var(--bg) 70%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ============================================================
   * 游戏容器：顶部控制栏 + 画布 + 右上角分数
   * ============================================================ */
  .game-wrap {
    position: relative;
    width: 600px;
    max-width: 96vw;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-right: auto;
  }
  .title span { color: var(--accent); }

  /* 通用按钮样式 */
  .btn {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
    user-select: none;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-launch {
    background: linear-gradient(135deg, var(--accent), #ff5e3a);
    border: none;
    box-shadow: 0 4px 14px rgba(255,140,66,0.35);
  }
  .btn-launch:hover { box-shadow: 0 6px 20px rgba(255,140,66,0.5); }

  .btn-reset {
    background: var(--danger);
    border: none;
    opacity: 0.85;
  }
  .btn-reset:hover { opacity: 1; }

  /* 挡板开关：紧凑复选框样式，不占额外按钮宽度 */
  .rail-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    padding: 4px 8px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    transition: background .2s ease;
  }
  .rail-toggle:hover { background: rgba(255,255,255,0.1); }
  .rail-toggle input {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid var(--muted);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    transition: background .15s ease, border-color .15s ease;
    margin: 0;
  }
  .rail-toggle input:checked {
    background: #2dd4bf;
    border-color: #14b8a6;
  }
  .rail-toggle input:checked::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 0px;
    width: 5px;
    height: 10px;
    border: solid #0f1424;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  /* 布局选择下拉框（复用 btn 外观） */
  .layout-sel {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    outline: none;
  }
  .layout-sel:hover { background: rgba(255,255,255,0.1); }
  .layout-sel option { background: var(--bg-2); color: var(--text); }

  /* 分数卡片（作为 topbar 内的 flex 项，不再使用绝对定位） */
  .score-card {
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 6px 16px;
    text-align: right;
    min-width: 110px;
    margin-left: 8px;
  }
  .score-card .label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-card .value {
    font-family: "Courier New", monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-2);
    line-height: 1.1;
    transition: transform .15s ease;
  }
  .score-card .value.bump { transform: scale(1.18); }

  /* 画布外框 */
  .canvas-frame {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(180deg, #0f1424 0%, #1a1a2e 100%);
    box-shadow: 0 10px 40px rgba(0,0,0,0.45);
  }
  canvas { display: block; width: 100%; height: auto; }

  /* 底部提示 */
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="game-wrap">
    <!-- 顶部控制栏：标题 + 布局选择 + 按钮 + 分数卡片，横向排列互不遮挡 -->
    <div class="topbar">
      <div class="title">倒弹珠 <span>PLINKO</span></div>
      <!-- 钉阵布局选择器：切换不同几何形状的钉子排列 -->
      <select class="btn layout-sel" id="layoutSel" title="选择钉阵布局">
        <option value="triangle">三角形</option>
        <option value="grid">正方形网格</option>
        <option value="diamond">菱形</option>
        <option value="hexagon">蜂巢</option>
      </select>
      <!-- 外围挡板开关：紧凑复选框样式，不占额外按钮宽度 -->
      <label class="rail-toggle" title="开/关外围挡板">
        <input type="checkbox" id="railChk" />
        <span>挡板</span>
      </label>
      <button class="btn btn-reset" id="resetBtn">重置游戏</button>
      <button class="btn btn-launch" id="launchBtn">发射弹珠</button>
      <!-- 实时分数卡片（作为 topbar 最后一项） -->
      <div class="score-card">
        <div class="label">Total Score</div>
        <div class="value" id="scoreVal">0</div>
      </div>
    </div>

    <!-- 游戏画布 -->
    <div class="canvas-frame">
      <canvas id="game" width="600" height="720"></canvas>
    </div>

    <div class="hint">画布拖动 = 瞄准发射（方向+力度） · 拖动发射器圆球 = 移动位置 · 按钮发射 = 垂直下落</div>
  </div>

<script>
/* ============================================================
 *  倒弹珠（Plinko）游戏 - 原生 JS 物理实现
 *  整体逻辑：requestAnimationFrame 循环 → 物理更新 → 渲染
 *  想调整游戏行为：修改下方 CONFIG 对象即可，无需改动其他代码
 * ============================================================ */

/* ============================================================
 * ① 可调参数集中区（修改这里即可自定义游戏）
 * ============================================================ */
const CONFIG = {
  // —— 钉阵布局 ——
  // layout 可选值：
  //   'triangle' 三角形（经典，每层钉数递增）
  //   'grid'     正方形网格（每行钉数相同，整齐矩形）
  //   'diamond'  菱形（中间宽、上下窄）
  //   'hexagon'  蜂巢（网格 + 奇偶行交错偏移半个间距）
  layout: 'triangle',
  pegRows: 10,            // 钉子层数（层数越多下落越复杂）
  gridCols: 11,           // 网格/蜂巢布局每行钉子数（仅 grid/hexagon 用到）
  pegSpacingX: 50,        // 钉子水平间距（像素）
  pegSpacingY: 50,        // 钉子垂直间距（像素）
  pegRadius: 6,           // 钉子半径
  pegStartY: 110,         // 第一层钉子的 Y 坐标

  // —— 弹珠物理参数 ——
  ballRadius: 9,          // 弹珠半径
  gravity: 0.28,          // 重力加速度（越大下落越快）
  restitution: 0.55,      // 弹性系数（0~1，越大反弹越高）
  friction: 0.999,        // 空气阻尼（越接近 1 阻力越小）
  wallRestitution: 0.5,   // 撞墙弹性系数
  launchJitter: 1.6,      // 发射时水平随机扰动幅度（越大越偏）

  // —— 发射器（愤怒的小鸟式拖动瞄准） ——
  launcher: {
    x: 300,         // 发射器初始 X 坐标（可拖动改变）
    y: 60,          // 发射器初始 Y 坐标（可拖动改变）
    r: 14,          // 发射器半径（用于点击判定与绘制）
    maxDragY: 100,  // 发射器可移动的最高 Y 边界（不超过第一层钉子）
  },
  launchPower: 0.18,   // 拖动距离 → 初速度的转换系数（越大同样拖动力度越大）
  maxPower: 16,        // 最大初速度上限（避免拖太远力度过大）
  minDragDist: 6,      // 最小有效拖动距离（小于此值不发射，避免误触）
  trajectorySteps: 24, // 瞄准时预测轨迹的点数（越大轨迹越长）

  // —— 外围挡板（防止弹珠未走完钉阵就飞出） ——
  // guardRails: true 时在钉阵左右两侧画挡板并参与碰撞，底部开放（无挡板）
  guardRails: false,
  guardRailRestitution: 0.7, // 撞挡板的弹性系数（越大反弹越强）
  guardRailPad: 14,          // 挡板距最外侧钉子的间距（像素）

  // —— 得分槽 ——
  // 从左到右依次对应每个槽位的分值；中间低、两侧高（经典 Plinko）
  // 槽位数量 = 数组长度，会自动按画布宽度等分
  slots: [100, 50, 20, 10, 5, 2, 5, 10, 20, 50, 100],

  // —— 视觉 ——
  ballColor: ['#ffd166', '#ff8c42'],   // 弹珠渐变色
  pegColor: '#4cc9f0',                 // 钉子颜色
};

/* ============================================================
 * ② 画布与状态初始化
 * ============================================================ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;   // 画布宽
const H = canvas.height;  // 画布高

let balls = [];     // 当前下落中的弹珠列表
let pegs = [];      // 钉子列表 {x, y, r}
let totalScore = 0; // 总得分
let slotRects = []; // 底部得分槽矩形 {x, w, score}
let hullPath = []; // 钉阵外圈顶点序列（顺时针，用于挡板绘制与碰撞）
let pegBounds = { minX: 0, maxX: W, topY: 0, bottomY: 0 }; // 钉阵包围盒（保留备用）

// DOM 元素引用
const scoreEl = document.getElementById('scoreVal');
const launchBtn = document.getElementById('launchBtn');
const resetBtn = document.getElementById('resetBtn');
const layoutSel = document.getElementById('layoutSel'); // 布局选择下拉框
const railChk = document.getElementById('railChk');   // 挡板开关复选框

/* ============================================================
 * ③ 构建钉阵（根据 CONFIG.layout 分发到不同布局）
 *    支持四种几何形状：三角形 / 正方形网格 / 菱形 / 蜂巢
 *    想新增布局：在下面加一个 buildXxx 函数，并在 switch 里加一个分支
 * ============================================================ */
function buildPegs() {
  pegs = [];
  switch (CONFIG.layout) {
    case 'grid':    buildGridPegs();    break;
    case 'diamond': buildDiamondPegs(); break;
    case 'hexagon': buildHexagonPegs(); break;
    case 'triangle':
    default:        buildTrianglePegs(); break;
  }
  // 计算钉阵外圈顶点序列（用于挡板）+ 包围盒
  if (pegs.length > 0) {
    let minX = Infinity, maxX = -Infinity, topY = Infinity, bottomY = -Infinity;
    for (const p of pegs) {
      if (p.x - p.r < minX) minX = p.x - p.r;
      if (p.x + p.r > maxX) maxX = p.x + p.r;
      if (p.y - p.r < topY) topY = p.y - p.r;
      if (p.y + p.r > bottomY) bottomY = p.y + p.r;
    }
    pegBounds = { minX, maxX, topY, bottomY };
    // 用凸包算法求外圈顶点序列（Andrew 单调链）
    hullPath = convexHull(pegs.map(p => ({ x: p.x, y: p.y })));
  } else {
    pegBounds = { minX: 0, maxX: W, topY: 0, bottomY: 0 };
    hullPath = [];
  }
}

/* Andrew 单调链凸包算法：输入点集，返回顺时针外圈顶点序列 */
function convexHull(points) {
  const pts = points.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const n = pts.length;
  if (n < 2) return pts.slice();
  const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  // 下半包
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  // 上半包
  const upper = [];
  for (let i = n - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper); // 顺时针闭合路径
}

/* —— 三角形：每层钉数递增，整体居中（经典 Plinko） —— */
function buildTrianglePegs() {
  const rows = CONFIG.pegRows;
  const sx = CONFIG.pegSpacingX;
  const sy = CONFIG.pegSpacingY;
  const startY = CONFIG.pegStartY;
  for (let row = 0; row < rows; row++) {
    const count = row + 2;                  // 第 0 层 2 个，依次递增
    const totalW = (count - 1) * sx;
    const startX = (W - totalW) / 2;
    for (let i = 0; i < count; i++) {
      pegs.push({ x: startX + i * sx, y: startY + row * sy, r: CONFIG.pegRadius });
    }
  }
}

/* —— 正方形网格：每行钉数相同，整齐矩形排列，整体居中 —— */
function buildGridPegs() {
  const rows = CONFIG.pegRows;
  const cols = CONFIG.gridCols;
  const sx = CONFIG.pegSpacingX;
  const sy = CONFIG.pegSpacingY;
  const startY = CONFIG.pegStartY;
  const totalW = (cols - 1) * sx;
  const startX = (W - totalW) / 2;
  for (let row = 0; row < rows; row++) {
    for (let i = 0; i < cols; i++) {
      pegs.push({ x: startX + i * sx, y: startY + row * sy, r: CONFIG.pegRadius });
    }
  }
}

/* —— 菱形：钉数从 1 递增到中间最大，再递减到 1，整体居中 —— */
function buildDiamondPegs() {
  const rows = CONFIG.pegRows;
  const sx = CONFIG.pegSpacingX;
  const sy = CONFIG.pegSpacingY;
  const startY = CONFIG.pegStartY;
  const mid = Math.floor(rows / 2); // 中间层索引
  for (let row = 0; row < rows; row++) {
    // 上半部分递增，下半部分递减
    const count = row <= mid ? (row + 2) : (rows - row + 1);
    const totalW = (count - 1) * sx;
    const startX = (W - totalW) / 2;
    for (let i = 0; i < count; i++) {
      pegs.push({ x: startX + i * sx, y: startY + row * sy, r: CONFIG.pegRadius });
    }
  }
}

/* —— 蜂巢：正方形网格基础上，奇数行整体偏移半个间距，形成交错 —— */
function buildHexagonPegs() {
  const rows = CONFIG.pegRows;
  const cols = CONFIG.gridCols;
  const sx = CONFIG.pegSpacingX;
  const sy = CONFIG.pegSpacingY;
  const startY = CONFIG.pegStartY;
  const totalW = (cols - 1) * sx;
  const startX = (W - totalW) / 2;
  for (let row = 0; row < rows; row++) {
    // 奇数行向右偏移半个间距，模拟蜂巢交错
    const offsetX = (row % 2 === 1) ? sx / 2 : 0;
    for (let i = 0; i < cols; i++) {
      pegs.push({ x: startX + i * sx + offsetX, y: startY + row * sy, r: CONFIG.pegRadius });
    }
  }
}

/* ============================================================
 * ④ 构建底部得分槽
 *    按 CONFIG.slots 数组等分画布宽度，并计算每个槽的矩形区域
 * ============================================================ */
function buildSlots() {
  slotRects = [];
  const n = CONFIG.slots.length;
  const slotW = W / n;
  // 槽位顶部 Y（弹珠到达此线即结算）
  const slotTopY = CONFIG.pegStartY + (CONFIG.pegRows - 1) * CONFIG.pegSpacingY + 60;
  for (let i = 0; i < n; i++) {
    slotRects.push({
      x: i * slotW,
      w: slotW,
      score: CONFIG.slots[i],
      topY: slotTopY,
      subtotal: 0,   // 该槽累计得分（每命中一颗弹珠累加）
      hits: 0,       // 该槽命中弹珠数
    });
  }
}

/* ============================================================
 * ⑤ 发射弹珠
 *    方式一：拖动瞄准发射（愤怒的小鸟式）
 *      - 在画布上按下并拖动 → 显示瞄准线与预测轨迹
 *      - 释放时按"拖动向量的反方向"发射，距离决定力度
 *    方式二：点击「发射弹珠」按钮 → 从发射器位置垂直下落（带随机扰动）
 * ============================================================ */

// 瞄准 / 拖动发射器状态
let aiming = false;            // 是否正在瞄准
let aimPos = null;             // 当前鼠标/手指位置
let draggingLauncher = false;  // 是否正在拖动发射器（移动其位置）

/* 从发射器位置按指定初速度发射一颗弹珠 */
function launchBall(vx, vy) {
  balls.push({
    x: CONFIG.launcher.x,
    y: CONFIG.launcher.y,
    vx: vx,
    vy: vy,
    r: CONFIG.ballRadius,
    settled: false,
  });
}

/* 按钮发射：垂直下落 + 微小随机水平扰动（无需拖动时的快捷发射） */
function launchBallFromButton() {
  launchBall((Math.random() - 0.5) * CONFIG.launchJitter, 0);
}

/* 把鼠标/触摸事件坐标换算成画布内部坐标（处理 CSS 缩放） */
function getCanvasPos(evt) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY,
  };
}

/* 处理按下：判定是"拖动发射器"还是"瞄准发射" */
function handleDown(evt) {
  const pos = getCanvasPos(evt);
  const dx = pos.x - CONFIG.launcher.x;
  const dy = pos.y - CONFIG.launcher.y;
  // 点在发射器圆圈内 → 进入拖动发射器模式
  if (Math.hypot(dx, dy) < CONFIG.launcher.r + 8) {
    draggingLauncher = true;
  } else {
    // 否则进入瞄准模式
    aiming = true;
    aimPos = pos;
  }
}

/* 处理移动：更新发射器位置 或 更新瞄准点 */
function handleMove(evt) {
  const pos = getCanvasPos(evt);
  if (draggingLauncher) {
    // 限制发射器在画布顶部区域内（不能进入钉阵）
    CONFIG.launcher.x = Math.max(20, Math.min(W - 20, pos.x));
    CONFIG.launcher.y = Math.max(20, Math.min(CONFIG.launcher.maxDragY, pos.y));
  } else if (aiming) {
    aimPos = pos;
  }
}

/* 处理释放：若是瞄准模式则发射弹珠 */
function handleUp(evt) {
  if (aiming && aimPos) {
    // 发射向量 = 发射器位置 - 鼠标位置（弹弓反向拉伸效果）
    const dx = CONFIG.launcher.x - aimPos.x;
    const dy = CONFIG.launcher.y - aimPos.y;
    const dist = Math.hypot(dx, dy);
    if (dist > CONFIG.minDragDist) {
      // 力度 = 拖动距离 × 系数，并限制最大值
      const power = Math.min(dist * CONFIG.launchPower, CONFIG.maxPower);
      const angle = Math.atan2(dy, dx);
      launchBall(Math.cos(angle) * power, Math.sin(angle) * power);
    }
  }
  aiming = false;
  draggingLauncher = false;
  aimPos = null;
}

// 鼠标事件
canvas.addEventListener('mousedown', handleDown);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('mouseleave', handleUp);
// 触摸事件（移动端）—— preventDefault 避免页面滚动
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(e); }, { passive: false });
canvas.addEventListener('touchmove',  (e) => { e.preventDefault(); handleMove(e); }, { passive: false });
canvas.addEventListener('touchend',   (e) => { e.preventDefault(); handleUp(e); }, { passive: false });

/* ============================================================
 * ⑤-2 圆 vs 线段碰撞（用于挡板：弹珠沿外圈连线反弹）
 *    A-C 为线段两端点，b 为弹珠，e 为弹性系数
 *    求弹珠圆心到线段的最近点 P，若距离 < 半径则沿法线反弹
 * ============================================================ */
function collideBallSegment(b, A, C, e) {
  const abx = b.x - A.x;
  const aby = b.y - A.y;
  const acx = C.x - A.x;
  const acy = C.y - A.y;
  const segLen2 = acx * acx + acy * acy;
  // 线段长度为 0 时退化为点-圆碰撞
  if (segLen2 < 1e-6) {
    const d = Math.hypot(abx, aby);
    if (d < b.r && d > 0) {
      const nx = abx / d, ny = aby / d;
      b.x = A.x + nx * b.r;
      b.y = A.y + ny * b.r;
      const vDotN = b.vx * nx + b.vy * ny;
      if (vDotN < 0) {
        b.vx -= (1 + e) * vDotN * nx;
        b.vy -= (1 + e) * vDotN * ny;
      }
    }
    return;
  }
  // 弹珠圆心在线段上的投影参数 t ∈ [0,1]
  let t = (abx * acx + aby * acy) / segLen2;
  t = Math.max(0, Math.min(1, t));
  // 最近点 P
  const px = A.x + acx * t;
  const py = A.y + acy * t;
  const dx = b.x - px;
  const dy = b.y - py;
  const dist = Math.hypot(dx, dy);
  if (dist < b.r && dist > 0) {
    // 法线（从线段指向弹珠）
    const nx = dx / dist;
    const ny = dy / dist;
    // 把弹珠推到挡板表面之外
    const overlap = b.r - dist;
    b.x += nx * overlap;
    b.y += ny * overlap;
    // 仅当朝挡板运动时反射
    const vDotN = b.vx * nx + b.vy * ny;
    if (vDotN < 0) {
      b.vx -= (1 + e) * vDotN * nx;
      b.vy -= (1 + e) * vDotN * ny;
    }
  }
}

/* ============================================================
 * ⑥ 物理更新（每帧调用）
 *    - 施加重力
 *    - 与每个钉子做圆-圆碰撞检测与反射
 *    - 与左右墙碰撞
 *    - 到达底部槽位线则结算分数
 * ============================================================ */
function updatePhysics() {
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.settled) continue;

    // —— 重力 ——
    b.vy += CONFIG.gravity;
    // —— 空气阻尼 ——
    b.vx *= CONFIG.friction;
    b.vy *= CONFIG.friction;
    // —— 位置更新 ——
    b.x += b.vx;
    b.y += b.vy;

    // —— 左右墙碰撞 ——
    if (b.x - b.r < 0) {
      b.x = b.r;
      b.vx = -b.vx * CONFIG.wallRestitution;
    } else if (b.x + b.r > W) {
      b.x = W - b.r;
      b.vx = -b.vx * CONFIG.wallRestitution;
    }

    // —— 外围挡板碰撞（开启时生效） ——
    // 挡板 = 钉阵外圈相邻顶点的连线，用「圆 vs 线段」碰撞让弹珠沿线段法线反弹
    if (CONFIG.guardRails && hullPath.length >= 2) {
      const n = hullPath.length;
      // 跳过底部边（最下面那条让弹珠落下去的边），仅对其他边做碰撞
      // 找到 y 最大的边（底边）的索引，避免弹珠被底边挡住无法进槽
      let bottomEdgeIdx = -1, maxY = -Infinity;
      for (let k = 0; k < n; k++) {
        const a = hullPath[k], c = hullPath[(k + 1) % n];
        const ey = (a.y + c.y) / 2;
        if (ey > maxY) { maxY = ey; bottomEdgeIdx = k; }
      }
      for (let k = 0; k < n; k++) {
        if (k === bottomEdgeIdx) continue; // 跳过底边，保留底部开放
        const A = hullPath[k], C = hullPath[(k + 1) % n];
        collideBallSegment(b, A, C, CONFIG.guardRailRestitution);
      }
    }

    // —— 与钉子碰撞 ——
    for (const p of pegs) {
      const dx = b.x - p.x;
      const dy = b.y - p.y;
      const dist = Math.hypot(dx, dy);
      const minDist = b.r + p.r;
      if (dist < minDist && dist > 0) {
        // 法线方向单位向量
        const nx = dx / dist;
        const ny = dy / dist;
        // 把弹珠推出钉子表面，避免穿透
        const overlap = minDist - dist;
        b.x += nx * overlap;
        b.y += ny * overlap;
        // 计算弹珠速度在法线方向的投影
        const vDotN = b.vx * nx + b.vy * ny;
        // 仅当弹珠朝钉子运动时才反射（vDotN < 0）
        if (vDotN < 0) {
          // 反射公式：v' = v - (1+e)(v·n)n
          b.vx -= (1 + CONFIG.restitution) * vDotN * nx;
          b.vy -= (1 + CONFIG.restitution) * vDotN * ny;
          // 加入微小随机扰动，让左右弹落更不可预测
          b.vx += (Math.random() - 0.5) * 0.6;
        }
      }
    }

    // —— 到达底部槽位线 → 结算 ——
    if (b.y + b.r >= slotRects[0].topY) {
      // 根据弹珠中心 x 判定落入哪个槽
      const idx = Math.min(slotRects.length - 1,
                           Math.max(0, Math.floor(b.x / (W / slotRects.length))));
      const slot = slotRects[idx];
      addScore(slot.score);
      // 同时累加该槽的小计分与命中数
      slot.subtotal += slot.score;
      slot.hits += 1;
      b.settled = true;
      // 从列表中移除该弹珠
      balls.splice(i, 1);
    }
  }
}

/* ============================================================
 * ⑦ 分数累加与显示（带数字弹跳动效）
 * ============================================================ */
function addScore(delta) {
  totalScore += delta;
  scoreEl.textContent = totalScore;
  // 触发一次缩放动画
  scoreEl.classList.remove('bump');
  void scoreEl.offsetWidth; // 强制重绘以重启动画
  scoreEl.classList.add('bump');
  setTimeout(() => scoreEl.classList.remove('bump'), 160);
}

/* ============================================================
 * ⑧ 渲染（每帧调用）
 *    绘制顺序：背景网格 → 得分槽 → 钉子 → 弹珠
 * ============================================================ */
function render() {
  // 清屏 + 背景
  ctx.clearRect(0, 0, W, H);

  // —— 背景细网格（装饰） ——
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 30) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // —— 发射器（可拖动位置） ——
  drawLauncher();

  // —— 瞄准线与预测轨迹（拖动瞄准时显示） ——
  if (aiming && aimPos) drawAimingGuide();

  // —— 外围挡板（开启时绘制，仅左右两侧，底部开放） ——
  if (CONFIG.guardRails) drawGuardRails();

  // —— 底部得分槽 ——
  const slotTop = slotRects[0].topY;
  for (const s of slotRects) {
    // 根据分值高低选择颜色（高分=暖色，低分=冷色）
    const t = s.score / 100; // 0~1
    const r = Math.round(70 + t * 185);
    const g = Math.round(90 + t * 50);
    const b2 = Math.round(160 - t * 100);
    // 槽位渐变填充
    const grad = ctx.createLinearGradient(0, slotTop, 0, H);
    grad.addColorStop(0, `rgba(${r},${g},${b2},0.15)`);
    grad.addColorStop(1, `rgba(${r},${g},${b2},0.55)`);
    ctx.fillStyle = grad;
    ctx.fillRect(s.x + 1, slotTop, s.w - 2, H - slotTop);

    // 槽位分隔线
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x, slotTop); ctx.lineTo(s.x, H);
    ctx.stroke();

    // 分值文字
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(s.score, s.x + s.w / 2, slotTop + 28);

    // —— 该槽命中次数显示区（位于分值文字下方） ——
    // 半透明小卡片背景
    const cardY = slotTop + 40;
    const cardH = 34;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(s.x + 4, cardY, s.w - 8, cardH);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(s.x + 4, cardY, s.w - 8, cardH);
    // "HITS" 标签（命中次数）
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '9px "Courier New", monospace';
    ctx.fillText('HITS', s.x + s.w / 2, cardY + 12);
    // 命中次数数字（命中后高亮）
    ctx.fillStyle = s.hits > 0 ? '#ffd166' : 'rgba(255,255,255,0.45)';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillText(s.hits, s.x + s.w / 2, cardY + 28);
  }
  // 最右侧分隔线
  ctx.beginPath();
  ctx.moveTo(W, slotTop); ctx.lineTo(W, H);
  ctx.stroke();

  // —— 钉子 ——
  for (const p of pegs) {
    // 阴影
    ctx.beginPath();
    ctx.arc(p.x + 1, p.y + 2, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();
    // 钉子主体
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = CONFIG.pegColor;
    ctx.fill();
    // 高光
    ctx.beginPath();
    ctx.arc(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
  }

  // —— 弹珠 ——
  for (const b of balls) {
    // 渐变球体
    const grad = ctx.createRadialGradient(
      b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1,
      b.x, b.y, b.r
    );
    grad.addColorStop(0, CONFIG.ballColor[0]);
    grad.addColorStop(1, CONFIG.ballColor[1]);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    // 高光点
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();
  }
}

/* ============================================================
 * ⑧-2 绘制发射器（弹弓底座 + 可拖动圆球）
 * ============================================================ */
function drawLauncher() {
  const { x, y, r } = CONFIG.launcher;
  // 底座阴影
  ctx.beginPath();
  ctx.ellipse(x, y + r + 4, r * 1.4, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();
  // 弹弓 Y 形支架（两根斜杆）
  ctx.strokeStyle = '#8a5a3b';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - r, y + r);
  ctx.lineTo(x - r * 0.6, y - r * 0.4);
  ctx.moveTo(x + r, y + r);
  ctx.lineTo(x + r * 0.6, y - r * 0.4);
  ctx.stroke();
  // 待发射弹珠（渐变球）
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grad.addColorStop(0, CONFIG.ballColor[0]);
  grad.addColorStop(1, CONFIG.ballColor[1]);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  // 高光
  ctx.beginPath();
  ctx.arc(x - r * 0.35, y - r * 0.35, r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fill();
  // 拖动时高亮提示边框
  if (draggingLauncher) {
    ctx.beginPath();
    ctx.arc(x, y, r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,209,102,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

/* ============================================================
 * ⑧-3 绘制瞄准引导：拉伸线 + 力度指示 + 预测抛物线轨迹
 * ============================================================ */
function drawAimingGuide() {
  const lx = CONFIG.launcher.x;
  const ly = CONFIG.launcher.y;
  const dx = lx - aimPos.x;
  const dy = ly - aimPos.y;
  const dist = Math.hypot(dx, dy);
  if (dist < CONFIG.minDragDist) return;

  // 计算发射初速度（与 handleUp 保持一致）
  const power = Math.min(dist * CONFIG.launchPower, CONFIG.maxPower);
  const angle = Math.atan2(dy, dx);
  const vx = Math.cos(angle) * power;
  const vy = Math.sin(angle) * power;

  // —— 弹弓拉伸线（从发射器到鼠标位置，模拟橡皮筋） ——
  ctx.strokeStyle = 'rgba(255,209,102,0.7)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(aimPos.x, aimPos.y);
  ctx.stroke();
  ctx.setLineDash([]);

  // —— 鼠标位置标记圈 ——
  ctx.beginPath();
  ctx.arc(aimPos.x, aimPos.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,209,102,0.5)';
  ctx.fill();

  // —— 预测抛物线轨迹（用相同物理模拟若干步，画虚线点） ——
  let px = lx, py = ly, pvx = vx, pvy = vy;
  ctx.fillStyle = 'rgba(255,140,66,0.6)';
  for (let i = 0; i < CONFIG.trajectorySteps; i++) {
    pvy += CONFIG.gravity;
    pvx *= CONFIG.friction;
    pvy *= CONFIG.friction;
    px += pvx;
    py += pvy;
    if (py > H || px < 0 || px > W) break; // 出界则停止
    // 越远的点越小越淡
    const alpha = 0.6 * (1 - i / CONFIG.trajectorySteps);
    const size = 3 * (1 - i / CONFIG.trajectorySteps * 0.5);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // —— 力度指示文字 ——
  const powerPct = Math.round((power / CONFIG.maxPower) * 100);
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 12px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`POWER ${powerPct}%`, aimPos.x + 10, aimPos.y - 10);
}

/* ============================================================
 * ⑧-4 绘制外围挡板（沿钉阵外圈顶点连线，跳过最底边）
 * ============================================================ */
function drawGuardRails() {
  if (hullPath.length < 2) return;
  const n = hullPath.length;
  // 找到 y 最大的边（底边）的索引，绘制时跳过它
  let bottomEdgeIdx = -1, maxY = -Infinity;
  for (let k = 0; k < n; k++) {
    const a = hullPath[k], c = hullPath[(k + 1) % n];
    const ey = (a.y + c.y) / 2;
    if (ey > maxY) { maxY = ey; bottomEdgeIdx = k; }
  }
  // 画外圈连线（跳过底边），白色半透明
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  let started = false;
  for (let k = 0; k < n; k++) {
    if (k === bottomEdgeIdx) continue; // 跳过底边
    const a = hullPath[k];
    if (!started) { ctx.moveTo(a.x, a.y); started = true; }
    else { ctx.lineTo(a.x, a.y); }
  }
  // 闭合到起点（如果起点不是底边端点的话，会自然连回）
  ctx.stroke();
  // 外圈顶点高亮圆点（让连线更清晰）
  ctx.fillStyle = '#ffd166';
  for (const p of hullPath) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ============================================================
 * ⑨ 主循环
 * ============================================================ */
function loop() {
  updatePhysics();
  render();
  requestAnimationFrame(loop);
}

/* ============================================================
 * ⑩ 重置游戏：清空弹珠、归零分数
 * ============================================================ */
function resetGame() {
  balls = [];
  totalScore = 0;
  scoreEl.textContent = '0';
  // 同时清零每个槽的小计分与命中数
  for (const s of slotRects) {
    s.subtotal = 0;
    s.hits = 0;
  }
}

/* ============================================================
 * ⑪ 事件绑定与启动
 * ============================================================ */
launchBtn.addEventListener('click', launchBallFromButton);
resetBtn.addEventListener('click', resetGame);

// 挡板开关：复选框勾选状态直接对应 guardRails
railChk.addEventListener('change', () => {
  CONFIG.guardRails = railChk.checked;
});

// 切换钉阵布局：更新 CONFIG.layout → 重建钉阵 → 重置游戏
layoutSel.addEventListener('change', () => {
  CONFIG.layout = layoutSel.value;
  resetGame();
  buildPegs();
});

// 空格键也可发射（按钮式垂直下落），R 键重置
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); launchBallFromButton(); }
  if (e.code === 'KeyR') { resetGame(); }
});

// 初始化并启动
buildPegs();
buildSlots();
loop();
</script>
