<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>倒弹珠 · Plinko</title>
<style>
  /* ============================================================
   * 全局样式与设计变量
   * 想修改配色：直接改 --bg / --accent / --peg 等变量即可
   * ============================================================ */
  :root {
    --bg: #1a1a2e;            /* 主背景色 */
    --bg-2: #16213e;          /* 次级背景色 */
    --panel: rgba(255,255,255,0.06); /* 半透明面板 */
    --border: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #8a8aa0;
    --accent: #ff8c42;        /* 主强调色（橙）- 发射按钮 */
    --accent-2: #ffd166;      /* 次强调色（黄）- 弹珠 */
    --peg: #4cc9f0;           /* 钉子色（青蓝） */
    --danger: #6c757d;        /* 重置按钮（灰） */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: radial-gradient(circle at 50% 0%, var(--bg-2), var(--bg) 70%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ============================================================
   * 游戏容器：顶部控制栏 + 画布 + 右上角分数
   * ============================================================ */
  .game-wrap {
    position: relative;
    width: 600px;
    max-width: 96vw;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-right: auto;
  }
  .title span { color: var(--accent); }

  /* 通用按钮样式 */
  .btn {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
    user-select: none;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-launch {
    background: linear-gradient(135deg, var(--accent), #ff5e3a);
    border: none;
    box-shadow: 0 4px 14px rgba(255,140,66,0.35);
  }
  .btn-launch:hover { box-shadow: 0 6px 20px rgba(255,140,66,0.5); }

  .btn-reset {
    background: var(--danger);
    border: none;
    opacity: 0.85;
  }
  .btn-reset:hover { opacity: 1; }

  /* 分数卡片（作为 topbar 内的 flex 项，不再使用绝对定位） */
  .score-card {
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 6px 16px;
    text-align: right;
    min-width: 110px;
    margin-left: 8px;
  }
  .score-card .label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-card .value {
    font-family: "Courier New", monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-2);
    line-height: 1.1;
    transition: transform .15s ease;
  }
  .score-card .value.bump { transform: scale(1.18); }

  /* 画布外框 */
  .canvas-frame {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(180deg, #0f1424 0%, #1a1a2e 100%);
    box-shadow: 0 10px 40px rgba(0,0,0,0.45);
  }
  canvas { display: block; width: 100%; height: auto; }

  /* 底部提示 */
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="game-wrap">
    <!-- 顶部控制栏：标题 + 按钮 + 分数卡片，横向排列互不遮挡 -->
    <div class="topbar">
      <div class="title">倒弹珠 <span>PLINKO</span></div>
      <button class="btn btn-reset" id="resetBtn">重置游戏</button>
      <button class="btn btn-launch" id="launchBtn">发射弹珠</button>
      <!-- 实时分数卡片（作为 topbar 最后一项） -->
      <div class="score-card">
        <div class="label">Total Score</div>
        <div class="value" id="scoreVal">0</div>
      </div>
    </div>

    <!-- 游戏画布 -->
    <div class="canvas-frame">
      <canvas id="game" width="600" height="720"></canvas>
    </div>

    <div class="hint">点击「发射弹珠」投放一颗 · 点击「重置游戏」清空全部</div>
  </div>

<script>
/* ============================================================
 *  倒弹珠（Plinko）游戏 - 原生 JS 物理实现
 *  整体逻辑：requestAnimationFrame 循环 → 物理更新 → 渲染
 *  想调整游戏行为：修改下方 CONFIG 对象即可，无需改动其他代码
 * ============================================================ */

/* ============================================================
 * ① 可调参数集中区（修改这里即可自定义游戏）
 * ============================================================ */
const CONFIG = {
  // —— 钉阵布局 ——
  pegRows: 10,            // 钉子层数（层数越多下落越复杂）
  pegSpacingX: 50,        // 钉子水平间距（像素）
  pegSpacingY: 50,        // 钉子垂直间距（像素）
  pegRadius: 6,           // 钉子半径
  pegStartY: 110,         // 第一层钉子的 Y 坐标

  // —— 弹珠物理参数 ——
  ballRadius: 9,          // 弹珠半径
  gravity: 0.28,          // 重力加速度（越大下落越快）
  restitution: 0.55,      // 弹性系数（0~1，越大反弹越高）
  friction: 0.999,        // 空气阻尼（越接近 1 阻力越小）
  wallRestitution: 0.5,   // 撞墙弹性系数
  launchJitter: 1.6,      // 发射时水平随机扰动幅度（越大越偏）

  // —— 得分槽 ——
  // 从左到右依次对应每个槽位的分值；中间低、两侧高（经典 Plinko）
  // 槽位数量 = 数组长度，会自动按画布宽度等分
  slots: [100, 50, 20, 10, 5, 2, 5, 10, 20, 50, 100],

  // —— 视觉 ——
  ballColor: ['#ffd166', '#ff8c42'],   // 弹珠渐变色
  pegColor: '#4cc9f0',                 // 钉子颜色
};

/* ============================================================
 * ② 画布与状态初始化
 * ============================================================ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;   // 画布宽
const H = canvas.height;  // 画布高

let balls = [];     // 当前下落中的弹珠列表
let pegs = [];      // 钉子列表 {x, y, r}
let totalScore = 0; // 总得分
let slotRects = []; // 底部得分槽矩形 {x, w, score}

// DOM 元素引用
const scoreEl = document.getElementById('scoreVal');
const launchBtn = document.getElementById('launchBtn');
const resetBtn = document.getElementById('resetBtn');

/* ============================================================
 * ③ 构建钉阵（三角形排列）
 *    第 i 层（i 从 0 开始）有 i+2 个钉子，整体水平居中
 *    相邻层交错排列，形成经典 Plinko 三角阵
 * ============================================================ */
function buildPegs() {
  pegs = [];
  const rows = CONFIG.pegRows;
  const sx = CONFIG.pegSpacingX;
  const sy = CONFIG.pegSpacingY;
  const startY = CONFIG.pegStartY;

  for (let row = 0; row < rows; row++) {
    // 本层钉子数量：第 0 层 2 个，第 1 层 3 个……依次递增
    const count = row + 2;
    // 整层钉子的总宽度，用于居中
    const totalW = (count - 1) * sx;
    const startX = (W - totalW) / 2;
    for (let i = 0; i < count; i++) {
      pegs.push({
        x: startX + i * sx,
        y: startY + row * sy,
        r: CONFIG.pegRadius,
      });
    }
  }
}

/* ============================================================
 * ④ 构建底部得分槽
 *    按 CONFIG.slots 数组等分画布宽度，并计算每个槽的矩形区域
 * ============================================================ */
function buildSlots() {
  slotRects = [];
  const n = CONFIG.slots.length;
  const slotW = W / n;
  // 槽位顶部 Y（弹珠到达此线即结算）
  const slotTopY = CONFIG.pegStartY + (CONFIG.pegRows - 1) * CONFIG.pegSpacingY + 60;
  for (let i = 0; i < n; i++) {
    slotRects.push({
      x: i * slotW,
      w: slotW,
      score: CONFIG.slots[i],
      topY: slotTopY,
    });
  }
}

/* ============================================================
 * ⑤ 发射弹珠
 *    在画布顶部中央生成一颗弹珠，赋予微小水平随机速度
 * ============================================================ */
function launchBall() {
  balls.push({
    x: W / 2 + (Math.random() - 0.5) * 6,  // 顶端投放点（带极小偏移）
    y: 40,
    vx: (Math.random() - 0.5) * CONFIG.launchJitter, // 水平随机扰动
    vy: 0,
    r: CONFIG.ballRadius,
    settled: false,   // 是否已落入槽位（结算后移除）
  });
}

/* ============================================================
 * ⑥ 物理更新（每帧调用）
 *    - 施加重力
 *    - 与每个钉子做圆-圆碰撞检测与反射
 *    - 与左右墙碰撞
 *    - 到达底部槽位线则结算分数
 * ============================================================ */
function updatePhysics() {
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.settled) continue;

    // —— 重力 ——
    b.vy += CONFIG.gravity;
    // —— 空气阻尼 ——
    b.vx *= CONFIG.friction;
    b.vy *= CONFIG.friction;
    // —— 位置更新 ——
    b.x += b.vx;
    b.y += b.vy;

    // —— 左右墙碰撞 ——
    if (b.x - b.r < 0) {
      b.x = b.r;
      b.vx = -b.vx * CONFIG.wallRestitution;
    } else if (b.x + b.r > W) {
      b.x = W - b.r;
      b.vx = -b.vx * CONFIG.wallRestitution;
    }

    // —— 与钉子碰撞 ——
    for (const p of pegs) {
      const dx = b.x - p.x;
      const dy = b.y - p.y;
      const dist = Math.hypot(dx, dy);
      const minDist = b.r + p.r;
      if (dist < minDist && dist > 0) {
        // 法线方向单位向量
        const nx = dx / dist;
        const ny = dy / dist;
        // 把弹珠推出钉子表面，避免穿透
        const overlap = minDist - dist;
        b.x += nx * overlap;
        b.y += ny * overlap;
        // 计算弹珠速度在法线方向的投影
        const vDotN = b.vx * nx + b.vy * ny;
        // 仅当弹珠朝钉子运动时才反射（vDotN < 0）
        if (vDotN < 0) {
          // 反射公式：v' = v - (1+e)(v·n)n
          b.vx -= (1 + CONFIG.restitution) * vDotN * nx;
          b.vy -= (1 + CONFIG.restitution) * vDotN * ny;
          // 加入微小随机扰动，让左右弹落更不可预测
          b.vx += (Math.random() - 0.5) * 0.6;
        }
      }
    }

    // —— 到达底部槽位线 → 结算 ——
    if (b.y + b.r >= slotRects[0].topY) {
      // 根据弹珠中心 x 判定落入哪个槽
      const idx = Math.min(slotRects.length - 1,
                           Math.max(0, Math.floor(b.x / (W / slotRects.length))));
      addScore(slotRects[idx].score);
      b.settled = true;
      // 从列表中移除该弹珠
      balls.splice(i, 1);
    }
  }
}

/* ============================================================
 * ⑦ 分数累加与显示（带数字弹跳动效）
 * ============================================================ */
function addScore(delta) {
  totalScore += delta;
  scoreEl.textContent = totalScore;
  // 触发一次缩放动画
  scoreEl.classList.remove('bump');
  void scoreEl.offsetWidth; // 强制重绘以重启动画
  scoreEl.classList.add('bump');
  setTimeout(() => scoreEl.classList.remove('bump'), 160);
}

/* ============================================================
 * ⑧ 渲染（每帧调用）
 *    绘制顺序：背景网格 → 得分槽 → 钉子 → 弹珠
 * ============================================================ */
function render() {
  // 清屏 + 背景
  ctx.clearRect(0, 0, W, H);

  // —— 背景细网格（装饰） ——
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 30) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // —— 顶部投放口指示 ——
  ctx.fillStyle = 'rgba(255,140,66,0.15)';
  ctx.fillRect(W / 2 - 18, 0, 36, 30);
  ctx.fillStyle = 'rgba(255,140,66,0.6)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DROP', W / 2, 20);

  // —— 底部得分槽 ——
  const slotTop = slotRects[0].topY;
  for (const s of slotRects) {
    // 根据分值高低选择颜色（高分=暖色，低分=冷色）
    const t = s.score / 100; // 0~1
    const r = Math.round(70 + t * 185);
    const g = Math.round(90 + t * 50);
    const b2 = Math.round(160 - t * 100);
    // 槽位渐变填充
    const grad = ctx.createLinearGradient(0, slotTop, 0, H);
    grad.addColorStop(0, `rgba(${r},${g},${b2},0.15)`);
    grad.addColorStop(1, `rgba(${r},${g},${b2},0.55)`);
    ctx.fillStyle = grad;
    ctx.fillRect(s.x + 1, slotTop, s.w - 2, H - slotTop);

    // 槽位分隔线
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x, slotTop); ctx.lineTo(s.x, H);
    ctx.stroke();

    // 分值文字
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(s.score, s.x + s.w / 2, slotTop + 28);
  }
  // 最右侧分隔线
  ctx.beginPath();
  ctx.moveTo(W, slotTop); ctx.lineTo(W, H);
  ctx.stroke();

  // —— 钉子 ——
  for (const p of pegs) {
    // 阴影
    ctx.beginPath();
    ctx.arc(p.x + 1, p.y + 2, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();
    // 钉子主体
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = CONFIG.pegColor;
    ctx.fill();
    // 高光
    ctx.beginPath();
    ctx.arc(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
  }

  // —— 弹珠 ——
  for (const b of balls) {
    // 渐变球体
    const grad = ctx.createRadialGradient(
      b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1,
      b.x, b.y, b.r
    );
    grad.addColorStop(0, CONFIG.ballColor[0]);
    grad.addColorStop(1, CONFIG.ballColor[1]);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    // 高光点
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();
  }
}

/* ============================================================
 * ⑨ 主循环
 * ============================================================ */
function loop() {
  updatePhysics();
  render();
  requestAnimationFrame(loop);
}

/* ============================================================
 * ⑩ 重置游戏：清空弹珠、归零分数
 * ============================================================ */
function resetGame() {
  balls = [];
  totalScore = 0;
  scoreEl.textContent = '0';
}

/* ============================================================
 * ⑪ 事件绑定与启动
 * ============================================================ */
launchBtn.addEventListener('click', launchBall);
resetBtn.addEventListener('click', resetGame);

// 空格键也可发射，提升手感
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); launchBall(); }
  if (e.code === 'KeyR') { resetGame(); }
});

// 初始化并启动
buildPegs();
buildSlots();
loop();
</script>
</body>
</html>
